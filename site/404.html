<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina nao encontrada — Assessoria Academica</title>
  <link rel="icon" href="/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --dark: #1a1a2e; --gold: #f0c030; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(160deg, #1a1a2e 0%, #0f1a30 50%, #1f2b47 100%); color: #fff; text-align: center; padding: 20px; }
    .box { max-width: 480px; }
    .code { font-size: 7rem; font-weight: 800; color: var(--gold); line-height: 1; margin-bottom: 8px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    p { color: #8892a4; font-size: 1rem; margin-bottom: 32px; line-height: 1.6; }
    .btn { display: inline-block; padding: 14px 32px; background: var(--gold); color: var(--dark); font-weight: 700; font-size: 1rem; border-radius: 10px; text-decoration: none; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(240,192,48,0.3); }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Pagina nao encontrada</h1>
    <p>A pagina que voce procura nao existe ou foi movida. Verifique o endereco ou volte para a pagina inicial.</p>
    <a href="/" class="btn">Voltar ao inicio</a>
  </div>
</body>
</html>
