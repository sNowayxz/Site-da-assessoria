<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividades — Painel Assessoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/painel.css">
</head>
<body>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <img src="../logo.png" alt="Logo" onerror="this.style.display='none'">
        </div>
        <div class="sidebar-brand-text">
          Assessoria<br>
          <small>Painel de Gestão</small>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-nav-label">Menu</div>
        <a href="app.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="alunos.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Alunos
        </a>
        <a href="atividades.html" class="sidebar-link active">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Atividades
        </a>

        <div class="sidebar-nav-label">Sistema</div>
        <button class="sidebar-link" id="btn-logout">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </button>
      </nav>

      <div class="sidebar-user">
        <div class="sidebar-avatar" id="user-avatar">A</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-name">Assessor</div>
          <div class="sidebar-user-role">Assessor</div>
        </div>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- MAIN -->
    <main class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-toggle" id="mobile-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1>Atividades</h1>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-gold" id="btn-nova-atividade">+ Nova Atividade</button>
        </div>
      </div>

      <!-- Counters -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">📋</div>
          <div class="stat-info">
            <h3 id="counter-total">0</h3>
            <p>Total</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">⏳</div>
          <div class="stat-info">
            <h3 id="counter-pendentes">0</h3>
            <p>Pendentes</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">🔄</div>
          <div class="stat-info">
            <h3 id="counter-andamento">0</h3>
            <p>Em Andamento</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">✅</div>
          <div class="stat-info">
            <h3 id="counter-entregues">0</h3>
            <p>Entregues</p>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="panel">
        <div class="filters-bar">
          <input type="text" id="filter-aluno" placeholder="Buscar por aluno ou RA...">
          <select id="filter-status">
            <option value="">Todos os status</option>
            <option value="pendente">Pendente</option>
            <option value="em_andamento">Em Andamento</option>
            <option value="entregue">Entregue</option>
            <option value="revisao">Revisão</option>
          </select>
          <select id="filter-tipo">
            <option value="">Todos os tipos</option>
            <option value="atividade">Atividade</option>
            <option value="mapa">Mapa</option>
            <option value="tcc">TCC</option>
            <option value="relatorio">Relatório</option>
            <option value="extensao">Extensão</option>
            <option value="pacote">Pacote</option>
          </select>
        </div>
        <div class="panel-body">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Aluno</th>
                  <th>Tipo</th>
                  <th>Descrição</th>
                  <th>Status</th>
                  <th>Valor</th>
                  <th>Criada</th>
                  <th>Atualizada</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="atividades-table">
                <tr><td colspan="8" class="empty-state">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- MODAL: Nova/Editar Atividade -->
  <div class="modal-overlay" id="modal-atividade">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title-ativ">Nova Atividade</h3>
        <button class="modal-close" onclick="closeModal('modal-atividade')">&times;</button>
      </div>
      <form id="form-atividade">
        <div class="modal-body">
          <div class="form-group">
            <label for="ativ-aluno-id">Aluno</label>
            <select name="aluno_id" id="ativ-aluno-id" required>
              <option value="">Selecione o aluno</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="ativ-tipo">Tipo</label>
              <select name="tipo" id="ativ-tipo" required>
                <option value="atividade">Atividade</option>
                <option value="mapa">Mapa</option>
                <option value="tcc">TCC</option>
                <option value="relatorio">Relatório</option>
                <option value="extensao">Extensão</option>
                <option value="pacote">Pacote</option>
              </select>
            </div>
            <div class="form-group">
              <label for="ativ-status">Status</label>
              <select name="status" id="ativ-status" required>
                <option value="pendente">Pendente</option>
                <option value="em_andamento">Em Andamento</option>
                <option value="entregue">Entregue</option>
                <option value="revisao">Revisão</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="ativ-descricao">Descrição</label>
            <input type="text" name="descricao" id="ativ-descricao" placeholder="Ex: MAPA - Gestão de Pessoas">
          </div>
          <div class="form-group">
            <label for="ativ-valor">Valor (R$)</label>
            <input type="number" name="valor" id="ativ-valor" step="0.01" min="0" placeholder="0.00">
          </div>
          <div class="form-group">
            <label for="ativ-observacoes">Observações</label>
            <textarea name="observacoes" id="ativ-observacoes" placeholder="Detalhes adicionais..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeModal('modal-atividade')">Cancelar</button>
          <button type="submit" class="btn-save">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/atividades.js"></script>
  <script>
    // Mobile sidebar toggle
    document.getElementById('mobile-toggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('open');
    });
    document.getElementById('sidebar-overlay').addEventListener('click', function () {
      document.getElementById('sidebar').classList.remove('open');
    });
    // Avatar
    document.addEventListener('DOMContentLoaded', async function () {
      var user = await getUser();
      if (user) {
        var name = getUserName(user);
        document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
      }
    });
  </script>

</body>
</html>
