<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Painel Assessoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://lztfoprapoyicldunhzw.supabase.co">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <base href="/painel/">
  <link rel="icon" type="image/png" href="../logo.png">
  <link rel="stylesheet" href="css/painel.css?v=7">
  <style>
    .remember-me { margin: 12px 0 4px; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.88rem; color: var(--gray-600); -webkit-user-select: none; -moz-user-select: none; user-select: none; }
    .checkbox-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--gold); cursor: pointer; }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="../logo.png" alt="Assessoria Acadêmica" onerror="this.style.display='none'">
      </div>
      <h1>Painel Assessoria</h1>
      <p class="subtitle">Acesse sua conta para gerenciar alunos e atividades</p>

      <div id="login-error" class="login-error"></div>

      <!-- 2FA Verification (hidden by default) -->
      <div id="mfa-section" style="display:none;">
        <p style="font-size:0.88rem;color:var(--gray-600);margin-bottom:16px;text-align:center;">Digite o código do seu app autenticador:</p>
        <div class="form-group" style="text-align:center;">
          <input type="text" id="mfa-code" maxlength="6" placeholder="000000" style="width:160px;text-align:center;font-size:1.4rem;letter-spacing:6px;padding:12px;border:2px solid var(--gray-200);border-radius:10px;margin:0 auto;" autocomplete="one-time-code">
        </div>
        <button type="button" id="btn-mfa-verify" class="btn-primary" style="width:100%;">Verificar Código</button>
        <button type="button" id="btn-mfa-back" style="background:none;border:none;color:var(--gray-400);font-size:0.85rem;cursor:pointer;margin-top:8px;display:block;text-align:center;width:100%;">← Voltar ao login</button>
      </div>

      <form id="form-login">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div style="position:relative;">
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" style="padding-right:42px;">
            <button type="button" id="toggle-password" title="Mostrar senha" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--gray-400);padding:4px;">👁️</button>
          </div>
        </div>

        <div class="remember-me">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" checked>
            <span>Manter-me conectado</span>
          </label>
        </div>

        <button type="submit" class="btn-primary" id="btn-login">Entrar</button>
      </form>

      <div class="login-footer">
        <button type="button" id="btn-forgot" style="background:none;border:none;color:var(--gold);font-size:0.85rem;font-weight:600;cursor:pointer;margin-bottom:12px;">Esqueci minha senha</button>
        <br>
        <a href="../">← Voltar ao site</a>
      </div>
      <div id="forgot-msg" style="display:none;margin-top:16px;padding:10px 14px;border-radius:8px;background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;font-size:0.85rem;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js?v=7"></script>
  <script src="js/utils.js?v=7"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Se já logado, redireciona
      redirectIfLoggedIn();

      var form = document.getElementById('form-login');
      var errorEl = document.getElementById('login-error');
      var btnLogin = document.getElementById('btn-login');

      // Toggle mostrar/ocultar senha
      document.getElementById('toggle-password').addEventListener('click', function () {
        var input = document.getElementById('password');
        var isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? '🙈' : '👁️';
        this.title = isHidden ? 'Ocultar senha' : 'Mostrar senha';
      });

      // Esqueci senha
      document.getElementById('btn-forgot').addEventListener('click', async function () {
        var email = document.getElementById('email').value.trim();
        if (!email) { alert('Digite seu e-mail primeiro'); return; }
        var forgotMsg = document.getElementById('forgot-msg');
        try {
          await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/painel/' });
          forgotMsg.style.display = 'block';
          forgotMsg.textContent = 'E-mail de recuperação enviado para ' + email;
        } catch (err) {
          forgotMsg.style.display = 'block';
          forgotMsg.style.background = '#fef2f2';
          forgotMsg.style.borderColor = '#fecaca';
          forgotMsg.style.color = '#ef4444';
          forgotMsg.textContent = 'Erro: ' + err.message;
        }
      });

      // Carregar preferência salva
      var rememberBox = document.getElementById('remember-me');
      var savedRemember = localStorage.getItem('remember-me');
      if (savedRemember === 'false') rememberBox.checked = false;

      // ─── MFA Verification ───
      var mfaSection = document.getElementById('mfa-section');

      document.getElementById('btn-mfa-back').addEventListener('click', function() {
        mfaSection.style.display = 'none';
        form.style.display = 'block';
        errorEl.classList.remove('show');
      });

      document.getElementById('btn-mfa-verify').addEventListener('click', async function() {
        var code = document.getElementById('mfa-code').value.trim();
        if (code.length !== 6) { errorEl.textContent = 'Digite o código de 6 dígitos.'; errorEl.classList.add('show'); return; }

        var btn = this;
        btn.disabled = true;
        btn.textContent = 'Verificando...';
        errorEl.classList.remove('show');

        try {
          var { data: factors } = await sb.auth.mfa.listFactors();
          var totpFactor = (factors.totp || []).find(function(f) { return f.status === 'verified'; });
          if (!totpFactor) throw new Error('Fator TOTP não encontrado');

          var { data: challenge, error: chErr } = await sb.auth.mfa.challenge({ factorId: totpFactor.id });
          if (chErr) throw chErr;

          var { error: vErr } = await sb.auth.mfa.verify({ factorId: totpFactor.id, challengeId: challenge.id, code: code });
          if (vErr) throw vErr;

          window.location.href = '/painel/app.html';
        } catch(err) {
          errorEl.textContent = 'Código inválido. Tente novamente.';
          errorEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Verificar Código';
        }
      });

      // Enter key on MFA input
      document.getElementById('mfa-code').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('btn-mfa-verify').click();
        }
      });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorEl.classList.remove('show');
        btnLogin.disabled = true;
        btnLogin.textContent = 'Entrando...';

        try {
          var email = document.getElementById('email').value.trim();
          var password = document.getElementById('password').value;
          var remember = rememberBox.checked;

          // Salvar preferência
          localStorage.setItem('remember-me', remember ? 'true' : 'false');

          var loginResult = await handleLogin(email, password);

          // Se NÃO quer manter, mover sessão para sessionStorage
          if (!remember) {
            sessionStorage.setItem('supabase-no-persist', 'true');
          } else {
            sessionStorage.removeItem('supabase-no-persist');
          }

          // Verificar se precisa de MFA
          var { data: aalData } = await sb.auth.mfa.getAuthenticatorAssuranceLevel();
          if (aalData && aalData.nextLevel === 'aal2' && aalData.currentLevel === 'aal1') {
            // Precisa verificar 2FA
            form.style.display = 'none';
            mfaSection.style.display = 'block';
            document.getElementById('mfa-code').value = '';
            document.getElementById('mfa-code').focus();
            btnLogin.disabled = false;
            btnLogin.textContent = 'Entrar';
            return;
          }

          window.location.href = '/painel/app.html';
        } catch (err) {
          errorEl.textContent = err.message === 'Invalid login credentials'
            ? 'E-mail ou senha incorretos.'
            : 'Erro ao fazer login: ' + err.message;
          errorEl.classList.add('show');
          btnLogin.disabled = false;
          btnLogin.textContent = 'Entrar';
        }
      });
    });
  </script>

</body>
</html>
