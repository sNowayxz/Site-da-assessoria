<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Painel Assessoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <base href="/painel/">
  <link rel="stylesheet" href="css/painel.css">
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="../logo.png" alt="Assessoria Acadêmica" onerror="this.style.display='none'">
      </div>
      <h1>Painel Assessoria</h1>
      <p class="subtitle">Acesse sua conta para gerenciar alunos e atividades</p>

      <div id="login-error" class="login-error"></div>

      <form id="form-login">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-primary" id="btn-login">Entrar</button>
      </form>

      <div class="login-footer">
        <button type="button" id="btn-forgot" style="background:none;border:none;color:var(--gold);font-size:0.85rem;font-weight:600;cursor:pointer;margin-bottom:12px;">Esqueci minha senha</button>
        <br>
        <a href="../">← Voltar ao site</a>
      </div>
      <div id="forgot-msg" style="display:none;margin-top:16px;padding:10px 14px;border-radius:8px;background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;font-size:0.85rem;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Se já logado, redireciona
      redirectIfLoggedIn();

      var form = document.getElementById('form-login');
      var errorEl = document.getElementById('login-error');
      var btnLogin = document.getElementById('btn-login');

      // Esqueci senha
      document.getElementById('btn-forgot').addEventListener('click', async function () {
        var email = document.getElementById('email').value.trim();
        if (!email) { alert('Digite seu e-mail primeiro'); return; }
        var forgotMsg = document.getElementById('forgot-msg');
        try {
          await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/painel/' });
          forgotMsg.style.display = 'block';
          forgotMsg.textContent = 'E-mail de recuperação enviado para ' + email;
        } catch (err) {
          forgotMsg.style.display = 'block';
          forgotMsg.style.background = '#fef2f2';
          forgotMsg.style.borderColor = '#fecaca';
          forgotMsg.style.color = '#ef4444';
          forgotMsg.textContent = 'Erro: ' + err.message;
        }
      });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorEl.classList.remove('show');
        btnLogin.disabled = true;
        btnLogin.textContent = 'Entrando...';

        try {
          var email = document.getElementById('email').value.trim();
          var password = document.getElementById('password').value;
          await handleLogin(email, password);
          window.location.href = '/painel/app.html';
        } catch (err) {
          errorEl.textContent = err.message === 'Invalid login credentials'
            ? 'E-mail ou senha incorretos.'
            : 'Erro ao fazer login: ' + err.message;
          errorEl.classList.add('show');
          btnLogin.disabled = false;
          btnLogin.textContent = 'Entrar';
        }
      });
    });
  </script>

</body>
</html>
