<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/painel.css">
  <style>
    .sheet-container {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      border-radius: 12px; border: 1px solid var(--gray-200, #e5e7eb);
      background: var(--white, #fff);
    }
    .sheet-toolbar {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      border-bottom: 1px solid var(--gray-100, #f3f4f6);
      flex-wrap: wrap;
    }
    .sheet-toolbar .tab-btn {
      padding: 7px 16px; border: 1px solid var(--gray-200, #e5e7eb);
      border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; background: transparent; color: var(--gray-500, #6b7280);
      font-family: inherit; transition: all 0.15s;
    }
    .sheet-toolbar .tab-btn.active {
      background: var(--gold, #f0c030); color: var(--dark, #0f172a);
      border-color: var(--gold, #f0c030);
    }
    .sheet-toolbar .tab-btn:hover:not(.active) {
      border-color: var(--gray-300); color: var(--gray-700);
    }
    .sheet-spacer { flex: 1; }
    .btn-open-sheet {
      padding: 7px 14px; border: 1px solid var(--gray-200, #e5e7eb);
      border-radius: 8px; font-size: 0.8rem; text-decoration: none;
      color: var(--gray-500, #6b7280); font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .btn-open-sheet:hover { border-color: var(--gray-300); color: var(--gray-700); }
    .btn-fullscreen {
      padding: 7px 12px; border: 1px solid var(--gray-200, #e5e7eb);
      border-radius: 8px; font-size: 0.8rem; cursor: pointer;
      background: transparent; color: var(--gray-500); font-family: inherit;
    }
    .btn-fullscreen:hover { border-color: var(--gray-300); color: var(--gray-700); }

    .sheet-frame {
      flex: 1; width: 100%; border: none; min-height: 500px;
    }

    /* Make main-content fill height */
    .main-content {
      display: flex; flex-direction: column;
    }
    .main-content > .topbar { flex-shrink: 0; }
    .sheet-container { flex: 1; margin: 0; }

    /* Fullscreen mode */
    .sheet-container.fullscreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999; border-radius: 0; border: none;
      display: flex; flex-direction: column;
      background: var(--white, #fff);
    }
    .sheet-container.fullscreen .sheet-toolbar {
      flex-shrink: 0;
      background: var(--white, #fff);
      border-bottom: 1px solid var(--gray-200, #e5e7eb);
      padding: 12px 20px;
    }
    .sheet-container.fullscreen .sheet-frame {
      flex: 1; min-height: 0; height: 0; width: 100%;
    }

    @media (max-width: 768px) {
      .sheet-frame { min-height: 400px; }
    }
  </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- MAIN -->
    <main class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-toggle" id="mobile-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1>Extens&otilde;es</h1>
        </div>
        <div class="topbar-actions">
          <button class="theme-toggle" id="btn-theme" title="Alternar tema">🌙</button>
        </div>
      </div>

      <div class="sheet-container" id="sheet-container">
        <div class="sheet-toolbar">
          <button class="tab-btn active" onclick="switchTab(0, this)">📋 Alunos</button>
          <button class="tab-btn" onclick="switchTab(1023205118, this)">💰 Pre&ccedil;os</button>
          <span class="sheet-spacer"></span>
          <a href="https://docs.google.com/spreadsheets/d/1yeFlBBZSMHqTziM7QBB3IVkMJQgXqTbvDEz9SvXXKDw/edit" target="_blank" class="btn-open-sheet">📊 Abrir no Google Sheets</a>
          <button class="btn-fullscreen" onclick="toggleFullscreen()" id="btn-fs" title="Tela cheia">⛶</button>
        </div>
        <iframe
          id="sheet-frame"
          class="sheet-frame"
          src="https://docs.google.com/spreadsheets/d/1yeFlBBZSMHqTziM7QBB3IVkMJQgXqTbvDEz9SvXXKDw/edit?gid=0&rm=minimal"
          allowfullscreen>
        </iframe>
      </div>
    </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    var SHEET_ID = '1yeFlBBZSMHqTziM7QBB3IVkMJQgXqTbvDEz9SvXXKDw';

    function switchTab(gid, btn) {
      document.getElementById('sheet-frame').src =
        'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/edit?gid=' + gid + '&rm=minimal';
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    }

    function toggleFullscreen() {
      var container = document.getElementById('sheet-container');
      container.classList.toggle('fullscreen');
      document.body.style.overflow = container.classList.contains('fullscreen') ? 'hidden' : '';
      var btn = document.getElementById('btn-fs');
      btn.textContent = container.classList.contains('fullscreen') ? '✕' : '⛶';
    }

    // ESC to exit fullscreen
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var container = document.getElementById('sheet-container');
        if (container.classList.contains('fullscreen')) {
          toggleFullscreen();
        }
      }
    });

    document.getElementById('mobile-toggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('open');
    });
    document.getElementById('sidebar-overlay').addEventListener('click', function () {
      document.getElementById('sidebar').classList.remove('open');
    });
    document.addEventListener('DOMContentLoaded', async function () {
      var user = await getUser();
      if (user) {
        var name = getUserName(user);
        document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
      }
    });
  </script>
