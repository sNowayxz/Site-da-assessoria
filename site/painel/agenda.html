<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda — Painel Assessoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/painel.css">
  <style>
    .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .calendar-header h2 { font-size: 1.2rem; font-weight: 700; color: var(--dark); }
    .calendar-nav { display: flex; gap: 8px; }
    .calendar-nav button { padding: 8px 16px; border: 2px solid var(--gray-200); border-radius: 8px; background: var(--white); color: var(--gray-600); font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .calendar-nav button:hover { border-color: var(--gold); color: var(--dark); }

    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
    .calendar-day-header { background: var(--dark); color: var(--gold); padding: 10px; text-align: center; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; }
    .calendar-day { background: var(--white); min-height: 100px; padding: 8px; position: relative; transition: background 0.15s; }
    .calendar-day:hover { background: var(--gold-glow); }
    .calendar-day.other-month { opacity: 0.4; }
    .calendar-day.today { background: rgba(240,192,48,0.08); }
    .calendar-day .day-num { font-size: 0.82rem; font-weight: 700; color: var(--gray-800); margin-bottom: 4px; }
    .calendar-day.today .day-num { color: var(--gold); background: var(--dark); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    .cal-event { font-size: 0.68rem; padding: 2px 6px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: default; }
    .cal-event.vencimento { background: rgba(239,68,68,0.12); color: #dc2626; }
    .cal-event.atividade { background: rgba(59,130,246,0.12); color: #2563eb; }
    .cal-event.entrega { background: rgba(34,197,94,0.12); color: #16a34a; }
    .cal-event.manual { background: rgba(139,92,246,0.12); color: #7c3aed; }

    .calendar-day:not(.other-month) { cursor: pointer; }

    /* Filters */
    .agenda-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-btn {
      padding: 6px 14px; border: 2px solid var(--gray-200); border-radius: 20px;
      background: var(--white); font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit; display: flex; align-items: center; gap: 6px;
    }
    .filter-btn .filter-dot { width: 8px; height: 8px; border-radius: 50%; }
    .filter-btn.active { background: var(--gray-100); border-color: var(--gray-400); }
    .filter-btn:not(.active) { opacity: 0.5; }

    /* Day detail modal */
    .day-event-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); }
    .day-event-item:last-child { border-bottom: none; }
    .day-event-time { font-size: 0.78rem; color: var(--gray-400); min-width: 45px; font-weight: 600; }
    .day-event-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
    .day-event-info { flex: 1; }
    .day-event-title { font-weight: 600; font-size: 0.9rem; color: var(--dark); }
    .day-event-desc { font-size: 0.8rem; color: var(--gray-400); margin-top: 2px; }
    .btn-delete-event { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1rem; padding: 4px 8px; opacity: 0.5; transition: opacity 0.2s; border-radius: 4px; }
    .btn-delete-event:hover { opacity: 1; background: rgba(239,68,68,0.08); }
    .day-empty { text-align: center; padding: 24px; color: var(--gray-400); font-size: 0.9rem; }

    /* Form rows */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--gray-500); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 12px; border: 2px solid var(--gray-200); border-radius: 8px;
      font-size: 0.9rem; font-family: inherit; background: var(--white); color: var(--dark);
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--gold);
    }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--gray-100); }
    .btn-cancel { padding: 10px 20px; border: 2px solid var(--gray-200); border-radius: 8px; background: var(--white); color: var(--gray-600); font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-save { padding: 10px 20px; border: none; border-radius: 8px; background: var(--gold); color: var(--dark); font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-save:hover { filter: brightness(1.1); }

    [data-theme="dark"] .calendar-grid { background: #30363d; }
    [data-theme="dark"] .calendar-day { background: #1c2128; }
    [data-theme="dark"] .calendar-day:hover { background: rgba(240,192,48,0.05); }
    [data-theme="dark"] .calendar-day.today { background: rgba(240,192,48,0.08); }
    [data-theme="dark"] .calendar-day .day-num { color: #e6edf3; }
    [data-theme="dark"] .cal-event.manual { background: rgba(139,92,246,0.15); color: #a78bfa; }
    [data-theme="dark"] .form-group input, [data-theme="dark"] .form-group select, [data-theme="dark"] .form-group textarea { background: #1c2128; color: #e6edf3; border-color: #30363d; }

    .cal-event[draggable="true"] { cursor: grab; }
    .cal-event.dragging { opacity: 0.4; }
    .calendar-day.drag-over { outline: 2px dashed var(--gold); background: var(--gold-glow) !important; }

    @media (max-width: 768px) {
      .calendar-day { min-height: 60px; padding: 4px; }
      .cal-event { font-size: 0.6rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

        <button class="modal-close" onclick="closeModal('modal-novo-evento')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>T&iacute;tulo</label>
          <input type="text" id="evento-titulo" placeholder="T&iacute;tulo do evento">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="evento-data">
          </div>
          <div class="form-group">
            <label>Hora (opcional)</label>
            <input type="time" id="evento-hora">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Tipo</label>
            <select id="evento-tipo">
              <option value="evento">Evento</option>
              <option value="lembrete">Lembrete</option>
              <option value="reuniao">Reuni&atilde;o</option>
              <option value="outro">Outro</option>
            </select>
          </div>
          <div class="form-group">
            <label>Cor</label>
            <select id="evento-cor">
              <option value="#8b5cf6">Roxo (padr&atilde;o)</option>
              <option value="#dc2626">Vermelho</option>
              <option value="#2563eb">Azul</option>
              <option value="#16a34a">Verde</option>
              <option value="#f59e0b">Amarelo</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Descri&ccedil;&atilde;o (opcional)</label>
          <textarea id="evento-descricao" rows="3" placeholder="Detalhes do evento..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal('modal-novo-evento')">Cancelar</button>
        <button class="btn-save" id="btn-salvar-evento">Salvar Evento</button>

    </div>

  <script>
    document.getElementById('mobile-toggle').addEventListener('click', function () { document.getElementById('sidebar').classList.toggle('open'); });
    document.getElementById('sidebar-overlay').addEventListener('click', function () { document.getElementById('sidebar').classList.remove('open'); });

    var currentYear, currentMonth, currentUserId = null;
    var allEvents = {};
    var activeFilters = ['vencimento', 'atividade', 'entrega', 'manual'];
    var MESES = ['Janeiro','Fevereiro','Mar\u00e7o','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    // ── Modal helpers ──
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', async function () {
      var result = await requireRole(['admin', 'assessor', 'visualizador']);
      if (!result) return;
      var user = result.user;
      var role = result.role;
      setupSidebarPermissions(role);
      currentUserId = user.id;
      document.getElementById('user-name').textContent = getUserName(user);
      document.getElementById('user-avatar').textContent = getUserName(user).charAt(0).toUpperCase();
      document.getElementById('btn-logout').addEventListener('click', handleLogout);

      // Hide action buttons for visualizador
      if (role === 'visualizador') {
        document.querySelectorAll('.btn-gold, #btn-novo-evento, #btn-add-evento-dia, .btn-delete-event').forEach(function(el) { el.style.display = 'none'; });
      }

      var now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();

      // Navigation
      document.getElementById('btn-prev-month').addEventListener('click', function () {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        renderCalendar();
      });
      document.getElementById('btn-next-month').addEventListener('click', function () {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        renderCalendar();
      });
      document.getElementById('btn-today').addEventListener('click', function () {
        var n = new Date(); currentYear = n.getFullYear(); currentMonth = n.getMonth();
        renderCalendar();
      });

      // Filters
      document.querySelectorAll('.filter-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          btn.classList.toggle('active');
          activeFilters = [];
          document.querySelectorAll('.filter-btn.active').forEach(function (b) {
            activeFilters.push(b.getAttribute('data-filter'));
          });
          renderCalendar();
        });
      });

      // New event modal
      document.getElementById('btn-novo-evento').addEventListener('click', function () {
        resetEventForm();
        openModal('modal-novo-evento');
      });
      document.getElementById('btn-salvar-evento').addEventListener('click', saveEvento);

      // Day modal: add event button
      document.getElementById('btn-add-evento-dia').addEventListener('click', function () {
        var dateStr = document.getElementById('modal-dia').getAttribute('data-date');
        closeModal('modal-dia');
        resetEventForm();
        if (dateStr) document.getElementById('evento-data').value = dateStr;
        openModal('modal-novo-evento');
      });

      await renderCalendar();
    });

    function resetEventForm() {
      document.getElementById('evento-titulo').value = '';
      document.getElementById('evento-data').value = '';
      document.getElementById('evento-hora').value = '';
      document.getElementById('evento-tipo').value = 'evento';
      document.getElementById('evento-cor').value = '#8b5cf6';
      document.getElementById('evento-descricao').value = '';
    }

    // ── Render Calendar ──
    async function renderCalendar() {
      document.getElementById('calendar-title').textContent = MESES[currentMonth] + ' ' + currentYear;

      var firstDay = new Date(currentYear, currentMonth, 1);
      var lastDay = new Date(currentYear, currentMonth + 1, 0);
      var startStr = firstDay.toISOString().slice(0, 10);
      var endStr = lastDay.toISOString().slice(0, 10);

      var events = {};
      try {
        // Payments
        var { data: pagamentos } = await sb.from('pagamentos').select('dt_vencimento, alunos(nome), status, valor').gte('dt_vencimento', startStr).lte('dt_vencimento', endStr);
        (pagamentos || []).forEach(function (p) {
          var dt = p.dt_vencimento;
          if (!events[dt]) events[dt] = [];
          events[dt].push({ type: 'vencimento', text: (p.alunos?.nome || 'Pgto') + ' R$' + (Number(p.valor)||0).toFixed(0), descricao: 'Vencimento: R$' + (Number(p.valor)||0).toFixed(2) + (p.status ? ' (' + p.status + ')' : '') });
        });

        // Activities
        var { data: atividades } = await sb.from('atividades').select('dt_entrega, descricao, tipo, alunos(nome)').not('dt_entrega', 'is', null).gte('dt_entrega', startStr).lte('dt_entrega', endStr);
        (atividades || []).forEach(function (a) {
          var dt = a.dt_entrega;
          if (!events[dt]) events[dt] = [];
          events[dt].push({ type: 'entrega', text: (a.alunos?.nome || '') + ' ' + (a.descricao || a.tipo), descricao: a.descricao || a.tipo });
        });

        // Studeo sync
        var { data: syncs } = await sb.from('studeo_sync').select('data_final, atividade, disciplina, respondida').eq('respondida', false).gte('data_final', startStr + 'T00:00:00').lte('data_final', endStr + 'T23:59:59');
        (syncs || []).forEach(function (s) {
          var dt = s.data_final ? s.data_final.slice(0, 10) : null;
          if (!dt) return;
          if (!events[dt]) events[dt] = [];
          events[dt].push({ type: 'atividade', text: s.atividade, descricao: s.disciplina || '' });
        });

        // Manual events
        var { data: manuais } = await sb.from('eventos_agenda').select('*').gte('data', startStr).lte('data', endStr);
        (manuais || []).forEach(function (m) {
          var dt = m.data;
          if (!events[dt]) events[dt] = [];
          events[dt].push({ type: 'manual', text: m.titulo, id: m.id, hora: m.hora, descricao: m.descricao || '', cor: m.cor, tipo_evento: m.tipo, deletable: true });
        });
      } catch (e) { console.warn('Calendar error:', e); }

      allEvents = events;

      // Build grid
      var grid = document.getElementById('calendar-grid');
      var html = '';
      var dias = ['Dom','Seg','Ter','Qua','Qui','Sex','S\u00e1b'];
      dias.forEach(function (d) { html += '<div class="calendar-day-header">' + d + '</div>'; });

      var startDow = firstDay.getDay();
      var daysInMonth = lastDay.getDate();
      var prevMonth = new Date(currentYear, currentMonth, 0);
      var today = new Date();
      var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

      // Previous month
      for (var i = startDow - 1; i >= 0; i--) {
        html += '<div class="calendar-day other-month"><div class="day-num">' + (prevMonth.getDate() - i) + '</div></div>';
      }

      // Current month
      for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = currentYear + '-' + String(currentMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        var isToday = dateStr === todayStr;
        var dayEvents = (events[dateStr] || []).filter(function (ev) { return activeFilters.indexOf(ev.type) !== -1; });

        html += '<div class="calendar-day' + (isToday ? ' today' : '') + '" data-date="' + dateStr + '">';
        html += '<div class="day-num">' + d + '</div>';
        dayEvents.slice(0, 3).forEach(function (ev) {
          var style = ev.cor && ev.type === 'manual' ? ' style="background:' + ev.cor + '20;color:' + ev.cor + ';"' : '';
          var dragAttr = ev.type === 'manual' && ev.id ? ' draggable="true" data-event-id="' + ev.id + '"' : '';
          html += '<div class="cal-event ' + ev.type + '"' + style + dragAttr + ' title="' + ev.text.replace(/"/g, '&quot;') + '">' + ev.text + '</div>';
        });
        if (dayEvents.length > 3) html += '<div style="font-size:0.65rem;color:var(--gray-400);">+' + (dayEvents.length - 3) + ' mais</div>';
        html += '</div>';
      }

      // Next month
      var totalCells = startDow + daysInMonth;
      var remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (var d = 1; d <= remaining; d++) {
        html += '<div class="calendar-day other-month"><div class="day-num">' + d + '</div></div>';
      }

      grid.innerHTML = html;

      // Day click handlers
      grid.querySelectorAll('.calendar-day:not(.other-month)').forEach(function (cell) {
        cell.addEventListener('click', function (e) {
          if (e.target.closest('.cal-event[draggable="true"]')) return;
          var ds = cell.getAttribute('data-date');
          if (ds) openDayDetail(ds);
        });
      });

      // Drag & drop for manual events
      initCalendarDragDrop();

      function initCalendarDragDrop() {
        var grid = document.getElementById('calendar-grid');

        grid.addEventListener('dragstart', function(e) {
          var el = e.target.closest('.cal-event[draggable="true"]');
          if (!el) return;
          e.stopPropagation();
          el.classList.add('dragging');
          e.dataTransfer.setData('text/plain', el.getAttribute('data-event-id'));
          e.dataTransfer.effectAllowed = 'move';
        });

        grid.addEventListener('dragend', function(e) {
          var el = e.target.closest('.cal-event');
          if (el) el.classList.remove('dragging');
          grid.querySelectorAll('.calendar-day.drag-over').forEach(function(d) { d.classList.remove('drag-over'); });
        });

        grid.addEventListener('dragover', function(e) {
          var day = e.target.closest('.calendar-day:not(.other-month)');
          if (!day) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          day.classList.add('drag-over');
        });

        grid.addEventListener('dragleave', function(e) {
          var day = e.target.closest('.calendar-day');
          if (day) day.classList.remove('drag-over');
        });

        grid.addEventListener('drop', async function(e) {
          e.preventDefault();
          var day = e.target.closest('.calendar-day:not(.other-month)');
          if (!day) return;
          day.classList.remove('drag-over');

          var eventId = e.dataTransfer.getData('text/plain');
          var newDate = day.getAttribute('data-date');
          if (!eventId || !newDate) return;

          try {
            var { error } = await sb.from('eventos_agenda').update({ data: newDate }).eq('id', eventId);
            if (error) throw error;
            showToast('Evento movido!', 'success');
            if (typeof logAudit === 'function') logAudit('move_evento', 'eventos_agenda', eventId, { new_date: newDate });
            await renderCalendar();
          } catch(err) {
            showToast('Erro ao mover: ' + err.message, 'error');
          }
        });
      }
    }

    // ── Day Detail Modal ──
    function openDayDetail(dateStr) {
      var parts = dateStr.split('-');
      var formattedDate = parts[2] + '/' + parts[1] + '/' + parts[0];
      document.getElementById('modal-dia-title').textContent = 'Eventos \u2014 ' + formattedDate;
      document.getElementById('modal-dia').setAttribute('data-date', dateStr);

      var dayEvents = (allEvents[dateStr] || []).filter(function (ev) { return activeFilters.indexOf(ev.type) !== -1; });
      var body = document.getElementById('modal-dia-body');

      if (!dayEvents.length) {
        body.innerHTML = '<div class="day-empty">Nenhum evento neste dia.</div>';
      } else {
        var typeLabels = { vencimento: 'Vencimento', atividade: 'Atividade', entrega: 'Entrega', manual: 'Evento' };
        var typeColors = { vencimento: '#dc2626', atividade: '#2563eb', entrega: '#16a34a', manual: '#8b5cf6' };

        body.innerHTML = dayEvents.map(function (ev) {
          var color = ev.cor || typeColors[ev.type] || '#8b5cf6';
          var label = ev.tipo_evento || typeLabels[ev.type] || ev.type;
          var hora = ev.hora ? ev.hora.slice(0, 5) : '';
          var deleteBtn = ev.deletable ? '<button class="btn-delete-event" onclick="deleteEvento(\'' + ev.id + '\')" title="Excluir">&times;</button>' : '';

          return '<div class="day-event-item">' +
            '<div class="day-event-time">' + (hora || '--:--') + '</div>' +
            '<div class="day-event-info">' +
              '<div><span class="day-event-badge" style="background:' + color + '20;color:' + color + ';">' + label + '</span></div>' +
              '<div class="day-event-title">' + ev.text + '</div>' +
              (ev.descricao ? '<div class="day-event-desc">' + ev.descricao + '</div>' : '') +
            '</div>' +
            deleteBtn +
          '</div>';
        }).join('');
      }

      openModal('modal-dia');
    }

    // ── Save Event ──
    async function saveEvento() {
      var titulo = document.getElementById('evento-titulo').value.trim();
      var data = document.getElementById('evento-data').value;
      if (!titulo || !data) { showToast('Preencha t\u00edtulo e data.', 'warning'); return; }

      var btn = document.getElementById('btn-salvar-evento');
      btn.textContent = 'Salvando...'; btn.disabled = true;

      try {
        var { error } = await sb.from('eventos_agenda').insert({
          titulo: titulo,
          data: data,
          hora: document.getElementById('evento-hora').value || null,
          tipo: document.getElementById('evento-tipo').value,
          descricao: document.getElementById('evento-descricao').value,
          cor: document.getElementById('evento-cor').value,
          user_id: currentUserId
        });

        if (error) throw error;
        closeModal('modal-novo-evento');
        showToast('Evento criado!', 'success');
        if (typeof logAudit === 'function') logAudit('create_evento', 'eventos_agenda', null, { titulo: titulo });
        await renderCalendar();
      } catch (e) {
        console.error('Erro ao salvar evento:', e);
        showToast('Erro ao salvar: ' + (e.message || e), 'error');
      } finally {
        btn.textContent = 'Salvar Evento'; btn.disabled = false;
      }
    }

    // ── Delete Event ──
    async function deleteEvento(id) {
      if (!confirm('Excluir este evento?')) return;
      try {
        var { error } = await sb.from('eventos_agenda').delete().eq('id', id);
        if (error) throw error;
        closeModal('modal-dia');
        showToast('Evento exclu\u00eddo.', 'success');
        if (typeof logAudit === 'function') logAudit('delete_evento', 'eventos_agenda', id, {});
        await renderCalendar();
      } catch (e) {
        console.error('Erro ao excluir:', e);
        showToast('Erro ao excluir: ' + (e.message || e), 'error');
      }
    }
  </script>
</body>
</html>
