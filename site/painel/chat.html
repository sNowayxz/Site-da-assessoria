<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Painel Assessoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://lztfoprapoyicldunhzw.supabase.co">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <base href="/painel/">
  <link rel="stylesheet" href="css/painel.css">
  <style>
    .chat-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 65px);
    }

    .chat-tabs {
      display: flex;
      flex-direction: row;
      gap: 0;
      border-bottom: 2px solid var(--gray-200);
      background: var(--white);
      padding: 0 16px;
    }
    .chat-tab {
      padding: 12px 24px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--gray-400);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .chat-tab:hover {
      color: var(--gray-600);
    }
    .chat-tab.active {
      color: var(--gray-800);
      border-bottom-color: var(--gold);
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex: 1;
      gap: 8px;
      padding: 20px 16px;
    }

    .chat-bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      position: relative;
      word-wrap: break-word;
    }
    .chat-bubble.own {
      align-self: flex-end;
      background: var(--gold-glow, rgba(240,192,48,0.15));
      border: 1px solid rgba(240,192,48,0.3);
    }
    .chat-bubble.other {
      align-self: flex-start;
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
    }

    .chat-sender {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gray-600);
      margin-bottom: 2px;
    }
    .chat-bubble.own .chat-sender {
      color: var(--gold);
    }
    .chat-text {
      font-size: 0.9rem;
      color: var(--gray-800);
      line-height: 1.4;
    }
    .chat-time {
      font-size: 0.68rem;
      color: var(--gray-400);
      margin-top: 4px;
      text-align: right;
    }

    .chat-input-area {
      display: flex;
      flex-direction: row;
      padding: 12px 16px;
      gap: 10px;
      border-top: 2px solid var(--gray-200);
      background: var(--white);
      align-items: center;
    }
    .chat-input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--white);
      color: var(--gray-800);
      transition: border-color 0.2s;
    }
    .chat-input-area input:focus {
      outline: none;
      border-color: var(--gold);
    }
    .chat-input-area button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: var(--gold);
      color: var(--dark);
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: filter 0.2s;
      white-space: nowrap;
    }
    .chat-input-area button:hover {
      filter: brightness(1.1);
    }
    .chat-input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chat-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--gray-400);
      font-size: 0.95rem;
    }

    .chat-date-separator {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--gray-400);
      padding: 8px 0;
    }

    /* Botão attach */
    .btn-attach {
      background: none;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--gray-500);
    }
    .btn-attach:hover {
      border-color: var(--gold);
      background: var(--gold-glow);
    }

    /* Upload preview */
    .chat-upload-preview {
      padding: 8px 16px;
      border-top: 1px solid var(--gray-200);
      background: var(--gray-50);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      color: var(--gray-600);
    }
    .chat-upload-preview img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--gray-200);
    }
    .chat-upload-preview .upload-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-upload-preview .upload-cancel {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
    }

    /* Delete button on bubble */
    .chat-bubble { position: relative; }
    .chat-bubble .btn-delete-msg {
      display: none;
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(239,68,68,0.9);
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 0.65rem;
      cursor: pointer;
      padding: 2px 5px;
      line-height: 1;
    }
    .chat-bubble:hover .btn-delete-msg { display: block; }

    /* File attachment in message */
    .chat-file-attach {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding: 6px 10px;
      background: rgba(0,0,0,0.04);
      border-radius: 6px;
      font-size: 0.8rem;
      text-decoration: none;
      color: var(--info);
      transition: background 0.2s;
    }
    .chat-file-attach:hover { background: rgba(0,0,0,0.08); }
    .chat-file-attach .file-icon { font-size: 1.1rem; }
    .chat-img-attach {
      margin-top: 6px;
      max-width: 260px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .chat-img-attach:hover { opacity: 0.85; }

    /* Dark mode */
    [data-theme="dark"] .chat-tabs {
      background: #1c2128;
      border-bottom-color: #30363d;
    }
    [data-theme="dark"] .chat-tab {
      color: #8b949e;
    }
    [data-theme="dark"] .chat-tab.active { color: var(--gold); }
    [data-theme="dark"] .chat-bubble.other { background: #21262d; border-color: #30363d; }
    [data-theme="dark"] .chat-bubble.own { background: rgba(240,192,48,0.1); border-color: rgba(240,192,48,0.2); }
    [data-theme="dark"] .chat-input-area { background: #1c2128; border-top-color: #30363d; }
    [data-theme="dark"] .chat-input-area input { background: #161b22; border-color: #30363d; color: #e6edf3; }
    [data-theme="dark"] .chat-date-separator { color: #8b949e; }
    [data-theme="dark"] .chat-sender { color: #8b949e; }
    [data-theme="dark"] .chat-bubble.own .chat-sender { color: var(--gold); }
    [data-theme="dark"] .chat-text {
      color: #e6edf3;
    }
    [data-theme="dark"] .chat-input-area input:focus { border-color: var(--gold); }
    [data-theme="dark"] .btn-attach { border-color: #30363d; color: #8b949e; }
    [data-theme="dark"] .btn-attach:hover { border-color: var(--gold); background: rgba(240,192,48,0.08); }
    [data-theme="dark"] .chat-upload-preview { background: #161b22; border-top-color: #30363d; color: #8b949e; }
    [data-theme="dark"] .chat-file-attach { background: rgba(255,255,255,0.05); color: #58a6ff; }
    [data-theme="dark"] .chat-file-attach:hover { background: rgba(255,255,255,0.08); }

    @media (max-width: 768px) {
      .chat-bubble {
        max-width: 85%;
      }
      .chat-tab {
        padding: 10px 16px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>

      <div class="chat-container">
        <div class="chat-tabs">
          <button class="chat-tab active" data-channel="geral" onclick="switchChannel('geral')">Geral</button>
          <button class="chat-tab" data-channel="urgente" onclick="switchChannel('urgente')">Urgente</button>
        </div>

        <div class="chat-messages" id="chat-messages">
          <div class="chat-empty" id="chat-empty">Carregando mensagens...</div>
        </div>

        <div class="chat-input-area">
          <input type="file" id="chat-file-input" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.zip,.rar,.txt">
          <button type="button" id="btn-attach" class="btn-attach" title="Enviar imagem ou arquivo" onclick="document.getElementById('chat-file-input').click()">📎</button>
          <input type="text" id="chat-input" placeholder="Digite sua mensagem..." autocomplete="off">
          <button id="btn-send" onclick="sendMessage()">Enviar</button>
        </div>
        <div class="chat-upload-preview" id="chat-upload-preview" style="display:none"></div>
      </div>
