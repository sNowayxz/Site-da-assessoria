<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Painel Assessoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/painel.css">
</head>
<body>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <img src="../logo.png" alt="Logo" onerror="this.style.display='none'">
        </div>
        <div class="sidebar-brand-text">
          Assessoria<br>
          <small>Painel de Gestão</small>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-nav-label">Menu</div>
        <a href="app.html" class="sidebar-link active">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="alunos.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Alunos
        </a>
        <a href="atividades.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Atividades
        </a>

        <div class="sidebar-nav-label">Sistema</div>
        <button class="sidebar-link" id="btn-logout">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </button>
      </nav>

      <div class="sidebar-user">
        <div class="sidebar-avatar" id="user-avatar">A</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-name">Assessor</div>
          <div class="sidebar-user-role">Assessor</div>
        </div>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- MAIN -->
    <main class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-toggle" id="mobile-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1>Dashboard</h1>
        </div>
        <div class="topbar-actions">
          <a href="atividades.html" class="btn btn-gold">+ Nova Atividade</a>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div class="stat-info">
            <h3 id="count-alunos">0</h3>
            <p>Total de Alunos</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">⏳</div>
          <div class="stat-info">
            <h3 id="count-pendentes">0</h3>
            <p>Pendentes</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">🔄</div>
          <div class="stat-info">
            <h3 id="count-andamento">0</h3>
            <p>Em Andamento</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">✅</div>
          <div class="stat-info">
            <h3 id="count-entregues">0</h3>
            <p>Entregues</p>
          </div>
        </div>
      </div>

      <!-- Recent Activities -->
      <div class="panel">
        <div class="panel-header">
          <h2>Últimas Atividades</h2>
          <a href="atividades.html" class="btn btn-sm btn-outline">Ver todas →</a>
        </div>
        <div class="panel-body">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Aluno</th>
                  <th>Tipo</th>
                  <th>Descrição</th>
                  <th>Status</th>
                  <th>Data</th>
                </tr>
              </thead>
              <tbody id="recent-activities">
                <tr><td colspan="5" class="empty-state">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Mobile sidebar toggle
    document.getElementById('mobile-toggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('open');
    });
    document.getElementById('sidebar-overlay').addEventListener('click', function () {
      document.getElementById('sidebar').classList.remove('open');
    });
    // Avatar initial
    document.addEventListener('DOMContentLoaded', async function () {
      var user = await getUser();
      if (user) {
        var name = getUserName(user);
        document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
      }
    });
  </script>

</body>
</html>
