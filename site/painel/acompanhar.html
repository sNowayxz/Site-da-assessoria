<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acompanhar Solicitações — Painel Assessoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://lztfoprapoyicldunhzw.supabase.co">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/painel.css">
  <style>
    .filter-bar {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar select, .filter-bar input {
      padding: 9px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px;
      font-size: 0.88rem; color: var(--gray-800); background: var(--white); outline: none;
    }
    .filter-bar select:focus, .filter-bar input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }

    .solic-table-wrap {
      background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow-x: auto;
    }
    .solic-table {
      width: 100%; border-collapse: collapse; font-size: 0.88rem;
    }
    .solic-table th {
      padding: 12px 16px; text-align: left; font-weight: 700; font-size: 0.78rem;
      text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray-500);
      background: var(--gray-50); border-bottom: 2px solid var(--gray-200);
    }
    .solic-table td {
      padding: 12px 16px; border-bottom: 1px solid var(--gray-100); vertical-align: middle;
    }
    .solic-table tr:hover td { background: rgba(240,192,48,0.03); }
    .solic-table .td-aluno { font-weight: 600; color: var(--gray-800); }
    .solic-table .td-ra { font-family: monospace; font-size: 0.82rem; color: var(--gray-500); }
    .solic-table .td-assessor { font-size: 0.82rem; color: var(--info); font-weight: 600; }

    .badge-status {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 0.72rem; font-weight: 700;
    }
    .badge-aguardando { background: rgba(245,158,11,0.15); color: #92700c; }
    .badge-desenvolvendo { background: rgba(59,130,246,0.12); color: #2563eb; }
    .badge-finalizado { background: rgba(34,197,94,0.12); color: #16a34a; }
    .badge-finalizado_cobrar { background: rgba(139,92,246,0.12); color: #7c3aed; }

    .status-select {
      padding: 4px 8px; border-radius: 8px; border: 1.5px solid var(--gray-200);
      font-size: 0.82rem; font-family: inherit; cursor: pointer;
    }
    .status-select:focus { border-color: var(--gold); }

    .progresso-input {
      width: 100%; padding: 6px 10px; border: 1.5px solid var(--gray-200); border-radius: 8px;
      font-size: 0.82rem; font-family: inherit; resize: none; min-height: 32px;
    }
    .progresso-input:focus { border-color: var(--gold); outline: none; }

    .btn-save-row {
      padding: 4px 10px; border: none; border-radius: 6px; background: var(--gold);
      color: var(--dark); font-weight: 700; font-size: 0.78rem; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .btn-save-row:hover { filter: brightness(1.1); }

    .stats-inline {
      display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .stat-pill {
      padding: 6px 16px; border-radius: 20px; font-size: 0.82rem; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .stat-pill.aguardando { background: rgba(245,158,11,0.1); color: #92700c; }
    .stat-pill.desenvolvendo { background: rgba(59,130,246,0.1); color: #2563eb; }
    .stat-pill.finalizado { background: rgba(34,197,94,0.1); color: #16a34a; }
    .stat-pill.total { background: var(--gray-100); color: var(--gray-600); }

    /* Barra de evolução */
    .evolucao-bar {
      width: 100%; height: 20px; background: var(--gray-100); border-radius: 10px;
      overflow: hidden; position: relative; min-width: 80px;
    }
    .evolucao-fill {
      height: 100%; border-radius: 10px; transition: width 0.3s ease;
      background: linear-gradient(90deg, var(--gold), #f59e0b);
    }
    .evolucao-text {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; color: var(--gray-800);
    }

    /* Origem tags */
    .origem-tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 0.68rem; font-weight: 700; margin-left: 6px; vertical-align: middle;
    }
    .origem-assessoria { background: #fef3c7; color: #92400e; }
    .origem-aluno { background: #dbeafe; color: #1d4ed8; }
    .origem-whatsapp { background: #dcfce7; color: #166534; }
    .origem-site { background: #ede9fe; color: #5b21b6; }

    /* Modal de adicionar aluno */
    .add-modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;
    }
    .add-modal.open { display: flex; }
    .add-content {
      background: var(--white); border-radius: 16px; padding: 28px; width: 90%; max-width: 520px;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalIn 0.2s ease;
    }
    .add-content h3 { margin: 0 0 20px; font-size: 1.1rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 0.75rem; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.03em; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: 10px;
      font-size: 0.88rem; font-family: inherit; color: var(--gray-800); background: var(--white);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--gold); outline: none; box-shadow: 0 0 0 3px var(--gold-glow);
    }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-actions { display: flex; gap: 10px; margin-top: 18px; }
    .form-actions .btn-submit {
      flex: 1; padding: 12px; border: none; border-radius: 10px; background: var(--gold);
      color: var(--dark); font-weight: 700; cursor: pointer; font-family: inherit; font-size: 0.9rem;
    }
    .form-actions .btn-submit:hover { filter: brightness(1.08); }
    .form-actions .btn-cancel {
      padding: 12px 20px; border: none; border-radius: 10px; background: var(--gray-100);
      color: var(--gray-700); font-weight: 600; cursor: pointer; font-family: inherit; font-size: 0.9rem;
    }

    /* Section com borda lateral colorida */
    .section-group.assessorias .solic-table-wrap { border-left: 3px solid #f59e0b; }
    .section-group.diretos .solic-table-wrap { border-left: 3px solid #3b82f6; }
    .section-group.finalizados .solic-table-wrap { border-left: 3px solid #22c55e; }

    [data-theme="dark"] .add-content { background: #1c2128; }
    [data-theme="dark"] .form-group input, [data-theme="dark"] .form-group select, [data-theme="dark"] .form-group textarea { background: #161b22; border-color: #30363d; color: #e6edf3; }
    [data-theme="dark"] .form-actions .btn-cancel { background: #30363d; color: #e6edf3; }

    /* Seção finalizada */
    .section-group { margin-bottom: 24px; }
    .section-header {
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      padding: 10px 16px; background: var(--gray-50); border-radius: 10px;
      margin-bottom: 8px; user-select: none; transition: background 0.2s;
    }
    .section-header:hover { background: var(--gray-100); }
    .section-header h3 { margin: 0; font-size: 0.9rem; font-weight: 700; color: var(--gray-700); }
    .section-header .section-count {
      padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700;
    }
    .section-header .chevron-icon {
      margin-left: auto; transition: transform 0.2s; width: 16px; height: 16px;
      stroke: var(--gray-500); fill: none; stroke-width: 2;
    }
    .section-header.collapsed .chevron-icon { transform: rotate(-90deg); }

    /* Botões de ação na linha */
    .row-actions { display: flex; gap: 4px; align-items: center; }
    .btn-icon {
      width: 30px; height: 30px; border: none; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
      background: transparent; transition: all 0.15s;
    }
    .btn-icon:hover { background: var(--gray-100); }
    .btn-icon.btn-delete:hover { background: rgba(239,68,68,0.1); color: #dc2626; }
    .btn-icon.btn-info:hover { background: rgba(59,130,246,0.1); color: #2563eb; }

    /* Modal de detalhes */
    .detail-modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;
    }
    .detail-modal.open { display: flex; }
    .detail-content {
      background: var(--white); border-radius: 16px; padding: 28px; width: 90%; max-width: 500px;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .detail-content h3 { margin: 0 0 20px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .detail-item { padding: 10px 14px; background: var(--gray-50); border-radius: 10px; }
    .detail-item.full { grid-column: 1 / -1; }
    .detail-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray-500); font-weight: 600; margin-bottom: 4px; }
    .detail-value { font-size: 0.9rem; font-weight: 600; color: var(--gray-800); word-break: break-word; }
    .detail-close {
      margin-top: 16px; width: 100%; padding: 10px; border: none; border-radius: 10px;
      background: var(--gray-100); color: var(--gray-700); font-weight: 600; cursor: pointer;
      font-family: inherit; font-size: 0.88rem;
    }
    .detail-close:hover { background: var(--gray-200); }

    /* Dark mode */
    [data-theme="dark"] .solic-table-wrap { background: #1c2128; }
    [data-theme="dark"] .solic-table th { background: #161b22; border-bottom-color: #30363d; color: #8b949e; }
    [data-theme="dark"] .solic-table td { border-bottom-color: #21262d; }
    [data-theme="dark"] .solic-table .td-aluno { color: #e6edf3; }
    [data-theme="dark"] .filter-bar select, [data-theme="dark"] .filter-bar input { background: #161b22; border-color: #30363d; color: #e6edf3; }
    [data-theme="dark"] .status-select { background: #161b22; border-color: #30363d; color: #e6edf3; }
    [data-theme="dark"] .progresso-input { background: #161b22; border-color: #30363d; color: #e6edf3; }
    [data-theme="dark"] .section-header { background: #161b22; }
    [data-theme="dark"] .section-header:hover { background: #1c2128; }
    [data-theme="dark"] .section-header h3 { color: #e6edf3; }
    [data-theme="dark"] .detail-content { background: #1c2128; }
    [data-theme="dark"] .detail-item { background: #161b22; }
    [data-theme="dark"] .detail-value { color: #e6edf3; }
    [data-theme="dark"] .detail-close { background: #30363d; color: #e6edf3; }
    [data-theme="dark"] .btn-icon:hover { background: #30363d; }

    @media (max-width: 768px) {
      .filter-bar { flex-direction: column; }
      .solic-table { font-size: 0.82rem; }
      .solic-table th, .solic-table td { padding: 8px 10px; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

      <div class="form-grid">
        <div class="form-group full">
          <label>Nome do Aluno *</label>
          <input type="text" id="add-nome" placeholder="Nome completo">
        </div>
        <div class="form-group">
          <label>RA</label>

          <textarea id="add-obs" placeholder="Tema da extensão, observações do aluno..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="document.getElementById('add-modal').classList.remove('open')">Cancelar</button>
        <button class="btn-submit" id="btn-submit-add">Cadastrar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js?v=6"></script>
  <script src="js/utils.js?v=6"></script>
  <script>
    var currentUserId = null;
    var currentRole = null;
    var _solicitacoes = [];
    var _assessorNames = {};
    var _collapsed = { finalizados: true, assessorias: false, diretos: false };

    document.addEventListener('DOMContentLoaded', async function () {
      var result = await requireRole(['admin', 'dono', 'extensao', 'assessoria']);
      if (!result) return;
      currentUserId = result.user.id;
      currentRole = result.role;
      setupSidebarPermissions(currentRole);
      document.getElementById('user-name').textContent = getUserName(result.user);
      document.getElementById('user-avatar').textContent = getUserName(result.user).charAt(0).toUpperCase();
      document.getElementById('btn-logout').addEventListener('click', handleLogout);

      // Show origin filter and add button for extensao/admin/dono
      if (currentRole !== 'assessoria') {
        document.getElementById('filter-origem').style.display = '';
        document.getElementById('btn-add-manual').style.display = '';
        document.getElementById('filter-origem').addEventListener('change', renderAll);

        // Abrir modal de cadastro
        document.getElementById('btn-add-manual').addEventListener('click', function () {
          document.getElementById('add-nome').value = '';
          document.getElementById('add-ra').value = '';
          document.getElementById('add-senha').value = '';
          document.getElementById('add-horas').value = '';
          document.getElementById('add-obs').value = '';
          document.getElementById('add-origem').value = 'whatsapp';
          document.getElementById('add-modal').classList.add('open');
        });

        // Submit do cadastro
        document.getElementById('btn-submit-add').addEventListener('click', async function () {
          var nome = document.getElementById('add-nome').value.trim();
          var ra = document.getElementById('add-ra').value.trim();
          var senha = document.getElementById('add-senha').value.trim();
          var horas = parseInt(document.getElementById('add-horas').value) || 0;
          var obs = document.getElementById('add-obs').value.trim();
          var origem = document.getElementById('add-origem').value;

          if (!nome) { showToast('Informe o nome do aluno', 'error'); return; }
          if (!horas) { showToast('Informe as horas contratadas', 'error'); return; }

          this.disabled = true; this.textContent = 'Salvando...';
          try {
            var { error } = await sb.from('solicitacoes').insert({
              aluno_nome: nome, ra: ra, senha: senha, horas: horas,
              observacoes: obs, status: 'aguardando', origem: origem,
              assessor_id: null
            });
            if (error) throw error;
            // Notificar extensão sobre novo cadastro
            fetch('https://site-da-assessoria.vercel.app/api/notify-status', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                aluno_nome: nome, ra: ra, novo_status: 'novo_pedido', horas: horas
              })
            }).catch(function() {});
            showToast('Aluno cadastrado!', 'success');
            document.getElementById('add-modal').classList.remove('open');
            await loadSolicitacoes();
          } catch (err) {
            showToast('Erro: ' + (err.message || err), 'error');
          } finally {
            this.disabled = false; this.textContent = 'Cadastrar';
          }
        });
      }

      // Load assessor names for admin/extensao
      if (currentRole !== 'assessoria') {
        var { data: assessores } = await sb.from('assessores').select('id, nome, label, role');
        (assessores || []).forEach(function (a) { _assessorNames[a.id] = { name: a.label || a.nome, role: a.role }; });
        var sel = document.getElementById('filter-assessor');
        sel.style.display = '';
        (assessores || []).filter(function (a) { return a.role === 'assessoria'; }).forEach(function (a) {
          sel.innerHTML += '<option value="' + a.id + '">' + escapeHtml(a.label || a.nome) + '</option>';
        });
      }

      document.getElementById('filter-status').addEventListener('change', renderAll);
      document.getElementById('filter-assessor').addEventListener('change', renderAll);
      document.getElementById('filter-busca').addEventListener('input', renderAll);

      // Fechar modais
      document.getElementById('detail-modal').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('open');
      });
      document.getElementById('add-modal').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('open');
      });

      await loadSolicitacoes();
    });

    async function loadSolicitacoes() {
      var query = sb.from('solicitacoes').select('*').order('created_at', { ascending: false });
      if (currentRole === 'assessoria') {
        query = query.eq('assessor_id', currentUserId);
      }
      var { data, error } = await query;
      if (error) { console.error(error); return; }
      _solicitacoes = data || [];
      renderAll();
    }

    function getFiltered() {
      var statusFilter = document.getElementById('filter-status').value;
      var assessorFilter = document.getElementById('filter-assessor').value;
      var origemFilter = document.getElementById('filter-origem').value;
      var busca = document.getElementById('filter-busca').value.toLowerCase();

      return _solicitacoes.filter(function (s) {
        if (statusFilter && s.status !== statusFilter) return false;
        if (assessorFilter && s.assessor_id !== assessorFilter) return false;
        if (origemFilter && (s.origem || 'assessoria') !== origemFilter) return false;
        if (busca) {
          var match = (s.aluno_nome || '').toLowerCase().indexOf(busca) !== -1
            || (s.ra || '').toLowerCase().indexOf(busca) !== -1;
          if (!match) return false;
        }
        return true;
      });
    }

    function isFromAssessoria(s) {
      if (s.origem === 'assessoria') return true;
      if (s.assessor_id && _assessorNames[s.assessor_id] && _assessorNames[s.assessor_id].role === 'assessoria') return true;
      return false;
    }

    function isDireto(s) {
      return !isFromAssessoria(s);
    }

    function isFinalizado(s) {
      return s.status === 'finalizado' || s.status === 'finalizado_cobrar';
    }

    function getOrigemLabel(s) {
      if (s.origem === 'whatsapp') return '<span class="origem-tag origem-whatsapp">WhatsApp</span>';
      if (s.origem === 'site') return '<span class="origem-tag origem-site">Site</span>';
      if (s.origem === 'aluno') return '<span class="origem-tag origem-aluno">Direto</span>';
      if (isFromAssessoria(s)) return '<span class="origem-tag origem-assessoria">Assessoria</span>';
      return '<span class="origem-tag origem-aluno">Direto</span>';
    }

    function renderAll() {
      var filtered = getFiltered();

      // Separar em 3 grupos
      var assessorias = filtered.filter(function(s) { return isFromAssessoria(s) && !isFinalizado(s); });
      var diretos = filtered.filter(function(s) { return isDireto(s) && !isFinalizado(s); });
      var finalizadas = filtered.filter(function(s) { return isFinalizado(s); });

      var container = document.getElementById('tables-container');
      var html = '';
      var hasContent = false;

      // Para extensao/admin: separar em seções
      if (currentRole !== 'assessoria') {
        // Seção Assessorias
        if (assessorias.length > 0) {
          hasContent = true;
          html += buildSection('assessorias', '📋 Solicitações de Assessorias', assessorias, 'rgba(245,158,11,0.12)', '#92700c');
        }

        // Seção Diretos (WhatsApp / Site / Cadastro)
        if (diretos.length > 0) {
          hasContent = true;
          html += buildSection('diretos', '👤 Alunos Diretos (WhatsApp / Site)', diretos, 'rgba(59,130,246,0.12)', '#2563eb');
        }
      } else {
        // Assessoria: tudo junto (não separa)
        var ativas = filtered.filter(function(s) { return !isFinalizado(s); });
        if (ativas.length > 0) {
          hasContent = true;
          html += '<div class="section-group"><div class="solic-table-wrap">' + buildTable(ativas) + '</div></div>';
        }
      }

      // Seção Finalizadas (sempre colapsável)
      if (finalizadas.length > 0) {
        hasContent = true;
        html += '<div class="section-group finalizados">';
        html += '<div class="section-header' + (_collapsed.finalizados ? ' collapsed' : '') + '" onclick="toggleSection(\'finalizados\')">';
        html += '<h3>✅ Finalizadas</h3>';
        html += '<span class="section-count" style="background:rgba(34,197,94,0.12);color:#16a34a;">' + finalizadas.length + '</span>';
        html += '<svg class="chevron-icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
        html += '</div>';
        html += '<div class="section-body" data-section="finalizados" style="' + (_collapsed.finalizados ? 'display:none;' : '') + '">';
        html += '<div class="solic-table-wrap">' + buildTable(finalizadas) + '</div>';
        html += '</div></div>';
      }

      if (!hasContent) {
        html = '<div class="solic-table-wrap"><table class="solic-table"><tbody><tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-400);">Nenhuma solicitação encontrada.</td></tr></tbody></table></div>';
      }

      container.innerHTML = html;
      renderStats();
    }

    function buildSection(key, title, items, bgColor, textColor) {
      var html = '<div class="section-group ' + key + '">';
      html += '<div class="section-header' + (_collapsed[key] ? ' collapsed' : '') + '" onclick="toggleSection(\'' + key + '\')">';
      html += '<h3>' + title + '</h3>';
      html += '<span class="section-count" style="background:' + bgColor + ';color:' + textColor + ';">' + items.length + '</span>';
      html += '<svg class="chevron-icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>';
      html += '</div>';
      html += '<div class="section-body" data-section="' + key + '" style="' + (_collapsed[key] ? 'display:none;' : '') + '">';
      html += '<div class="solic-table-wrap">' + buildTable(items) + '</div>';
      html += '</div></div>';
      return html;
    }

    function toggleSection(key) {
      _collapsed[key] = !_collapsed[key];
      var body = document.querySelector('.section-body[data-section="' + key + '"]');
      var header = body ? body.previousElementSibling : null;
      if (!body || !header) return;
      if (_collapsed[key]) {
        header.classList.add('collapsed');
        body.style.display = 'none';
      } else {
        header.classList.remove('collapsed');
        body.style.display = '';
      }
    }

    var STATUS_LABELS = {
      aguardando: 'Aguardando',
      desenvolvendo: 'Desenvolvendo',
      finalizado: 'Finalizado',
      finalizado_cobrar: 'Finalizado a Cobrar'
    };

    function buildTable(items) {
      var canEdit = currentRole !== 'assessoria';
      var canDelete = currentRole === 'extensao' || currentRole === 'admin' || currentRole === 'dono';

      var html = '<table class="solic-table"><thead><tr>';
      html += '<th>Status</th><th>Nome do Aluno</th><th>Responsável</th>';
      html += '<th>Horas Contratadas</th><th>Horas Validadas</th><th>Evolução</th><th>Horas a Validar</th><th></th>';
      html += '</tr></thead><tbody>';

      items.forEach(function (s) {
        var assessorInfo = _assessorNames[s.assessor_id];
        var assessorName = assessorInfo ? assessorInfo.name : (isDireto(s) ? 'Direto' : 'Assessoria');
        var horas = s.horas || 0;
        var horasValidadas = s.horas_validadas || 0;
        var horasAValidar = Math.max(0, horas - horasValidadas);
        var evolucao = horas > 0 ? Math.round((horasValidadas / horas) * 100) : 0;
        if (evolucao > 100) evolucao = 100;
        var badgeClass = 'badge-' + (s.status || 'aguardando');
        var statusText = STATUS_LABELS[s.status] || s.status;

        html += '<tr data-id="' + s.id + '">';

        // Status
        if (canEdit) {
          html += '<td data-label="Status"><select class="status-select" data-id="' + s.id + '" onchange="markChanged(this)">'
            + '<option value="aguardando"' + (s.status === 'aguardando' ? ' selected' : '') + '>Aguardando</option>'
            + '<option value="desenvolvendo"' + (s.status === 'desenvolvendo' ? ' selected' : '') + '>Desenvolvendo</option>'
            + '<option value="finalizado"' + (s.status === 'finalizado' ? ' selected' : '') + '>Finalizado</option>'
            + '<option value="finalizado_cobrar"' + (s.status === 'finalizado_cobrar' ? ' selected' : '') + '>Finalizado a Cobrar</option>'
            + '</select></td>';
        } else {
          html += '<td data-label="Status"><span class="badge-status ' + badgeClass + '">' + statusText + '</span></td>';
        }

        // Nome + origem tag
        html += '<td data-label="Aluno" class="td-aluno">' + escapeHtml(s.aluno_nome) + getOrigemLabel(s) + '</td>';

        // Responsável
        html += '<td data-label="Responsável" class="td-assessor">' + escapeHtml(assessorName) + '</td>';

        // Horas Contratadas
        html += '<td data-label="Contratadas" style="text-align:center;">' + horas + 'h</td>';

        // Horas Validadas
        if (canEdit) {
          html += '<td data-label="Validadas"><input type="number" class="progresso-input" data-id="' + s.id + '" data-field="horas_validadas" value="' + horasValidadas + '" min="0" oninput="markChanged(this)" style="width:70px;text-align:center;"></td>';
        } else {
          html += '<td data-label="Validadas" style="text-align:center;">' + (horasValidadas ? horasValidadas + 'h' : '—') + '</td>';
        }

        // Evolução
        html += '<td data-label="Evolução">'
          + '<div class="evolucao-bar">'
          + '<div class="evolucao-fill" style="width:' + evolucao + '%;' + (evolucao >= 100 ? 'background:linear-gradient(90deg,#22c55e,#16a34a);' : '') + '"></div>'
          + '<div class="evolucao-text">' + (evolucao > 0 ? evolucao + '%' : '') + '</div>'
          + '</div></td>';

        // Horas a Validar
        html += '<td data-label="A Validar" style="text-align:center;font-weight:600;color:' + (horasAValidar > 0 ? '#d97706' : '#16a34a') + ';">' + horasAValidar + 'h</td>';

        // Ações
        html += '<td data-label=""><div class="row-actions">';
        // Botão info (ver detalhes)
        html += '<button class="btn-icon btn-info" onclick="showDetail(\'' + s.id + '\')" title="Ver detalhes">🔍</button>';
        // Botão salvar
        if (canEdit) {
          html += '<button class="btn-icon btn-save-row" data-id="' + s.id + '" onclick="saveRow(\'' + s.id + '\')" style="display:none;" title="Salvar">💾</button>';
        }
        // Botão excluir
        if (canDelete) {
          html += '<button class="btn-icon btn-delete" onclick="deleteRow(\'' + s.id + '\')" title="Excluir">🗑️</button>';
        }
        html += '</div></td>';

        html += '</tr>';
      });

      html += '</tbody></table>';
      return html;
    }

    function renderStats() {
      var stats = { aguardando: 0, desenvolvendo: 0, finalizado: 0, finalizado_cobrar: 0, total: _solicitacoes.length, assessoria: 0, direto: 0 };
      _solicitacoes.forEach(function (s) {
        stats[s.status] = (stats[s.status] || 0) + 1;
        if (isFromAssessoria(s)) stats.assessoria++;
        else stats.direto++;
      });
      var origemInfo = currentRole !== 'assessoria'
        ? '<div class="stat-pill" style="background:rgba(245,158,11,0.08);color:#92700c;">📋 ' + stats.assessoria + ' assessorias</div>' +
          '<div class="stat-pill" style="background:rgba(59,130,246,0.08);color:#2563eb;">👤 ' + stats.direto + ' diretos</div>'
        : '';
      document.getElementById('stats-inline').innerHTML =
        '<div class="stat-pill total">📊 ' + stats.total + ' total</div>' +
        origemInfo +
        '<div class="stat-pill aguardando">⏳ ' + stats.aguardando + ' aguardando</div>' +
        '<div class="stat-pill desenvolvendo">🔄 ' + stats.desenvolvendo + ' desenvolvendo</div>' +
        '<div class="stat-pill finalizado">✅ ' + (stats.finalizado + stats.finalizado_cobrar) + ' finalizados</div>';
    }

    function markChanged(el) {
      var id = el.getAttribute('data-id');
      var btn = document.querySelector('.btn-save-row[data-id="' + id + '"]');
      if (btn) btn.style.display = '';
    }

    async function saveRow(id) {
      var statusEl = document.querySelector('.status-select[data-id="' + id + '"]');
      var horasValEl = document.querySelector('input[data-id="' + id + '"][data-field="horas_validadas"]');
      var btn = document.querySelector('.btn-save-row[data-id="' + id + '"]');

      var update = { updated_at: new Date().toISOString() };
      if (statusEl) update.status = statusEl.value;
      if (horasValEl) update.horas_validadas = parseInt(horasValEl.value) || 0;

      if (btn) { btn.textContent = '...'; btn.disabled = true; }

      try {
        var { error } = await sb.from('solicitacoes').update(update).eq('id', id);
        if (error) throw error;

        // Notificar por email se status mudou
        var item = _solicitacoes.find(function(s) { return s.id === id; });
        if (update.status && item && update.status !== item.status) {
          fetch('https://site-da-assessoria.vercel.app/api/notify-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              aluno_nome: item.aluno_nome,
              ra: item.ra,
              novo_status: update.status,
              horas: item.horas
            })
          }).catch(function() {}); // Não bloqueia se falhar
        }

        showToast('Atualizado!', 'success');
        _solicitacoes.forEach(function (s) {
          if (s.id === id) {
            if (update.status) s.status = update.status;
            if (update.horas_validadas !== undefined) s.horas_validadas = update.horas_validadas;
          }
        });
        renderAll();
      } catch (err) {
        showToast('Erro: ' + (err.message || err), 'error');
      } finally {
        if (btn) { btn.textContent = '💾'; btn.disabled = false; }
      }
    }

    async function deleteRow(id) {
      var item = _solicitacoes.find(function(s) { return s.id === id; });
      if (!item) return;
      if (!confirm('Excluir solicitação de "' + item.aluno_nome + '"?\n\nEssa ação não pode ser desfeita.')) return;

      try {
        var { error } = await sb.from('solicitacoes').delete().eq('id', id);
        if (error) throw error;
        _solicitacoes = _solicitacoes.filter(function(s) { return s.id !== id; });
        showToast('Solicitação excluída!', 'success');
        renderAll();
      } catch(err) {
        showToast('Erro ao excluir: ' + (err.message || err), 'error');
      }
    }

    function showDetail(id) {
      var s = _solicitacoes.find(function(item) { return item.id === id; });
      if (!s) return;

      var assessorInfo = _assessorNames[s.assessor_id];
      var assessorName = assessorInfo ? assessorInfo.name : (isDireto(s) ? 'Direto' : 'Assessoria');
      var horas = s.horas || 0;
      var horasValidadas = s.horas_validadas || 0;
      var horasAValidar = Math.max(0, horas - horasValidadas);
      var evolucao = horas > 0 ? Math.round((horasValidadas / horas) * 100) : 0;
      var statusText = STATUS_LABELS[s.status] || s.status;
      var origemLabels = { assessoria: 'Assessoria', aluno: 'Direto', whatsapp: 'WhatsApp', site: 'Compra pelo Site' };
      var origem = origemLabels[s.origem] || 'Direto';
      var data = s.created_at ? new Date(s.created_at).toLocaleDateString('pt-BR') : '—';

      var html = '<h3>📋 Detalhes da Solicitação</h3>';
      html += '<div class="detail-grid">';

      html += '<div class="detail-item"><div class="detail-label">Aluno</div><div class="detail-value">' + escapeHtml(s.aluno_nome) + '</div></div>';
      html += '<div class="detail-item"><div class="detail-label">RA</div><div class="detail-value">' + escapeHtml(s.ra || '—') + '</div></div>';
      html += '<div class="detail-item"><div class="detail-label">Status</div><div class="detail-value"><span class="badge-status badge-' + s.status + '">' + statusText + '</span></div></div>';
      html += '<div class="detail-item"><div class="detail-label">Origem</div><div class="detail-value">' + origem + '</div></div>';
      html += '<div class="detail-item"><div class="detail-label">Responsável</div><div class="detail-value">' + escapeHtml(assessorName) + '</div></div>';
      html += '<div class="detail-item"><div class="detail-label">Data</div><div class="detail-value">' + data + '</div></div>';
      html += '<div class="detail-item"><div class="detail-label">Horas Contratadas</div><div class="detail-value">' + horas + 'h</div></div>';
      html += '<div class="detail-item"><div class="detail-label">Horas Validadas</div><div class="detail-value">' + horasValidadas + 'h</div></div>';
      html += '<div class="detail-item"><div class="detail-label">Horas Restantes</div><div class="detail-value" style="color:' + (horasAValidar > 0 ? '#d97706' : '#16a34a') + ';">' + horasAValidar + 'h</div></div>';
      html += '<div class="detail-item"><div class="detail-label">Progresso</div><div class="detail-value">' + evolucao + '%</div></div>';

      if (s.valor_hora) {
        html += '<div class="detail-item"><div class="detail-label">Valor/Hora</div><div class="detail-value">R$ ' + parseFloat(s.valor_hora).toFixed(2) + '</div></div>';
      }
      if (s.valor_pago) {
        html += '<div class="detail-item"><div class="detail-label">Valor Pago</div><div class="detail-value">R$ ' + parseFloat(s.valor_pago).toFixed(2) + '</div></div>';
      }

      // Senha (apenas extensao/admin)
      if ((currentRole === 'extensao' || currentRole === 'admin' || currentRole === 'dono') && s.senha) {
        html += '<div class="detail-item"><div class="detail-label">Senha Studeo</div><div class="detail-value" style="font-family:monospace;">' + escapeHtml(s.senha) + '</div></div>';
      }

      // Observações (tema etc)
      if (s.observacoes) {
        html += '<div class="detail-item full"><div class="detail-label">Observações / Tema</div><div class="detail-value">' + escapeHtml(s.observacoes) + '</div></div>';
      }

      html += '</div>';
      html += '<button class="detail-close" onclick="document.getElementById(\'detail-modal\').classList.remove(\'open\')">Fechar</button>';

      document.getElementById('detail-content').innerHTML = html;
      document.getElementById('detail-modal').classList.add('open');
    }
  </script>
</body>
</html>
