<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rastreio Studeo — Painel Assessoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/painel.css">
  <style>
    /* ── Rastreio-specific styles ── */
    .sync-bar {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .sync-bar select {
      padding: 10px 14px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--gray-800);
      background: var(--white);
      min-width: 260px;
      outline: none;
      transition: border-color var(--transition);
    }
    .sync-bar select:focus { border-color: var(--gold); }
    .sync-bar .btn { white-space: nowrap; }
    .btn-sync {
      background: var(--info);
      color: var(--white);
      box-shadow: 0 2px 8px rgba(59,130,246,0.25);
    }
    .btn-sync:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }
    .btn-sync-all {
      background: var(--gold);
      color: var(--dark);
      box-shadow: 0 2px 8px var(--gold-shadow);
    }
    .btn-sync-all:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
    }

    .sync-status {
      display: none;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }
    .sync-loading {
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      color: #2563eb;
    }
    .sync-success {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      color: #16a34a;
    }
    .sync-error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #dc2626;
    }
    .sync-warning {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
      color: #d97706;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    /* Discipline Cards */
    .disc-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
      transition: all var(--transition);
      border: 1px solid transparent;
    }
    .disc-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--gray-100);
    }
    .disc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 20px 24px;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-100);
      gap: 16px;
      flex-wrap: wrap;
    }
    .disc-info h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .disc-meta {
      display: block;
      font-size: 0.78rem;
      color: var(--gray-400);
      font-family: monospace;
    }
    .disc-badges {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .disc-activities {
      padding: 0;
    }
    .ativ-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--gray-100);
      gap: 12px;
      transition: background 0.2s;
    }
    .ativ-row:last-child { border-bottom: none; }
    .ativ-row:hover { background: rgba(240,192,48,0.03); }

    .ativ-pendente { border-left: 3px solid #f59e0b; }
    .ativ-respondida { border-left: 3px solid #22c55e; }

    .ativ-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .ativ-nome {
      font-size: 0.88rem;
      color: var(--gray-800);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ativ-extra {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .ativ-data {
      font-size: 0.78rem;
      color: var(--gray-400);
      white-space: nowrap;
    }

    .badge-mapa { background: rgba(139,92,246,0.12); color: #7c3aed; }
    .badge-av { background: rgba(59,130,246,0.12); color: #2563eb; }
    .badge-respondida { background: rgba(34,197,94,0.12); color: #16a34a; }

    .filters-rastreio {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filters-rastreio select {
      padding: 9px 14px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-size: 0.88rem;
      color: var(--gray-800);
      background: var(--white);
      min-width: 200px;
      outline: none;
      transition: border-color var(--transition);
    }
    .filters-rastreio select:focus { border-color: var(--gold); }

    /* Tabs */
    .tabs-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: var(--white);
      padding: 6px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--gray-400);
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }
    .tab-btn.active {
      background: var(--gold);
      color: var(--dark);
      box-shadow: 0 2px 8px var(--gold-shadow);
    }
    .tab-btn:hover:not(.active) { color: var(--gray-800); background: var(--gray-50); }

    @media (max-width: 768px) {
      .sync-bar { flex-direction: column; align-items: stretch; }
      .sync-bar select { min-width: unset; width: 100%; }
      .disc-header { flex-direction: column; }
      .ativ-row { flex-direction: column; align-items: flex-start; }
      .ativ-extra { margin-top: 8px; }
      .filters-rastreio { flex-direction: column; }
      .filters-rastreio select { min-width: unset; width: 100%; }
    }
  </style>
</head>
<body>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <img src="../logo.png" alt="Logo" onerror="this.style.display='none'">
        </div>
        <div class="sidebar-brand-text">
          Assessoria<br>
          <small>Painel de Gestão</small>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-nav-label">Menu</div>
        <a href="app.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="alunos.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Alunos
        </a>
        <a href="atividades.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Atividades
        </a>
        <a href="modulos.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Módulos
        </a>
        <a href="financeiro.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Financeiro
        </a>
        <a href="rastreio.html" class="sidebar-link active">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Rastreio
        </a>

        <div class="sidebar-nav-label">Sistema</div>
        <button class="sidebar-link" id="btn-logout">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </button>
      </nav>

      <div class="sidebar-user">
        <div class="sidebar-avatar" id="user-avatar">A</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-name">Assessor</div>
          <div class="sidebar-user-role">Assessor</div>
        </div>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- MAIN -->
    <main class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-toggle" id="mobile-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1>Rastreio Studeo</h1>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div class="stat-info">
            <h3 id="count-mensalistas">0</h3>
            <p>Mensalistas</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">📋</div>
          <div class="stat-info">
            <h3 id="count-atividades-sync">0</h3>
            <p>Atividades Sync</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">⏳</div>
          <div class="stat-info">
            <h3 id="count-pendentes-sync">0</h3>
            <p>Pendentes</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">✅</div>
          <div class="stat-info">
            <h3 id="count-respondidas-sync">0</h3>
            <p>Respondidas</p>
          </div>
        </div>
      </div>

      <!-- Discipline Tabs -->
      <div class="tabs-bar" id="disc-tabs">
        <button class="tab-btn active" data-tab="todas">Todas</button>
        <button class="tab-btn" data-tab="ativas">Ativas</button>
        <button class="tab-btn" data-tab="passadas">Passadas</button>
      </div>

      <!-- Sync Bar -->
      <div class="sync-bar">
        <select id="sync-aluno-select">
          <option value="">Selecione um aluno para sincronizar</option>
        </select>
        <button class="btn btn-sync" id="btn-sync">🔄 Sincronizar</button>
        <button class="btn btn-sync-all" id="btn-sync-all">⚡ Sincronizar Todos</button>
      </div>

      <!-- Sync Status -->
      <div class="sync-status" id="sync-status"></div>

      <!-- Filters -->
      <div class="filters-rastreio">
        <select id="filter-aluno-rastreio">
          <option value="">Todos os mensalistas</option>
        </select>
        <select id="filter-status-rastreio">
          <option value="">Todos os status</option>
          <option value="pendente">Pendentes</option>
          <option value="respondida">Respondidas</option>
        </select>
      </div>

      <!-- Results -->
      <div id="sync-results">
        <div class="empty-state" style="padding:48px;text-align:center;color:#8892a4;">
          Carregando...
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/rastreio.js"></script>
  <script>
    // Mobile sidebar toggle
    document.getElementById('mobile-toggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('open');
    });
    document.getElementById('sidebar-overlay').addEventListener('click', function () {
      document.getElementById('sidebar').classList.remove('open');
    });
    // Avatar
    document.addEventListener('DOMContentLoaded', async function () {
      var user = await getUser();
      if (user) {
        var name = getUserName(user);
        document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
      }
    });
  </script>

</body>
</html>
